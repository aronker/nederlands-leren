<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands Trainer</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🇳🇱</div>
    <h1 class="header-title">Nederlands <span>Trainer</span></h1>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="nl">NL</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
    <button id="openWelcome" class="welcome-trigger" aria-label="Help">
      <span class="welcome-trigger-icon">💡</span>
      <span class="welcome-trigger-label" data-i18n="btn-help">Hulp</span>
    </button>
  </div>

  <!-- WELCOME MODAL -->
  <div id="welcomeOverlay" class="welcome-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
    <div class="welcome-modal">
      <div class="welcome-header">
        <div class="welcome-logo">🇳🇱</div>
        <h2 class="welcome-title" id="welcomeTitle" data-i18n="welcome-title">Welkom bij Nederlands Trainer</h2>
        <div class="welcome-lang-switcher">
          <button class="lang-btn active" data-lang="nl">NL</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="fr">FR</button>
        </div>
      </div>
      <div class="welcome-body">
        <p id="welcomeText" data-i18n="welcome-text"></p>
      </div>
      <div class="welcome-footer">
        <button id="closeWelcome" data-i18n="welcome-close">Begrepen, aan de slag!</button>
      </div>
    </div>
  </div>

  <!-- TAB NAV -->
  <div class="tabs">
    <button class="tab active" data-tab="werkwoorden"><span class="icon">🔤</span><span class="tab-label" data-i18n="tab-verbs"> Werkwoorden</span></button>
    <button class="tab" data-tab="zinnen"><span class="icon">💬</span><span class="tab-label" data-i18n="tab-sentences"> Zinnen</span></button>
    <button class="tab" data-tab="qa"><span class="icon">❓</span><span class="tab-label" data-i18n="tab-qa"> Vraag &amp; Antwoord</span></button>
  </div>

  <!-- ════════════════════════════════════════════════
       TAB 1 — WERKWOORDEN
  ════════════════════════════════════════════════ -->
  <div id="werkwoorden" class="section active">

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="w-add">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-add"></span>
        <div class="toolbar-row">
        <input type="text" id="wWord" data-i18n-ph="ph-verb" placeholder="Werkwoord">
        <select id="wType" style="min-width:130px;">
          <option value="regulier" data-i18n="opt-regular">regulier</option>
          <option value="irregulier" data-i18n="opt-irregular">onregelmatig</option>
        </select>
        <input type="text" id="wBetekenis" data-i18n-ph="ph-meaning" placeholder="Betekenis" style="min-width:130px;flex:1;">
        <input type="text" id="wIk" placeholder="Ik" style="width:90px;">
        <input type="text" id="wJij" placeholder="Jij/Je" style="width:90px;">
        <input type="text" id="wHij" placeholder="Hij/Zij" style="width:90px;">
        <input type="text" id="wWij" placeholder="Wij/We" style="width:90px;">
        <input type="text" id="wJullie" placeholder="Jullie" style="width:90px;">
        <input type="text" id="wZij" placeholder="Zij/Ze" style="width:90px;">
        <input type="text" id="wPrep" data-i18n-ph="ph-prep" placeholder="Prepositie" style="width:110px;">
        <button id="wAdd" data-i18n="btn-add">+ Toevoegen</button>
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="w-add"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="w-sort">?</button></div>
      <div class="toolbar" style="gap:16px;align-items:flex-start;">

        <div class="toolbar-group">
          <span class="toolbar-label" data-i18n="lbl-sort"></span>
          <div class="toolbar-row">
            <select id="wSort">
              <option value="original" data-i18n="opt-original">Origineel</option>
              <option value="abc">ABC</option>
              <option value="abc_irreg" data-i18n="opt-abc-irreg">ABC (onregelmatig eerst)</option>
              <option value="random" data-i18n="opt-random">Willekeurig</option>
            </select>
          </div>
        </div>

        <div class="toolbar-group" style="margin-left:auto;">
          <span class="toolbar-label" data-i18n="lbl-file"></span>
          <div class="toolbar-row">
            <button id="wDownload" data-i18n="btn-download">⬇ Downloaden</button>
            <label id="wFileLabel" class="btn-file" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;border:1.5px solid var(--border);background:white;color:var(--text);">
              <span data-i18n="btn-import">⬆ Importeren</span> <input type="file" id="wFile" accept=".xlsx,.csv">
            </label>
            <button id="wExample" class="btn-secondary" data-i18n="btn-example">📋 Voorbeeld</button>
          </div>
        </div>

        <div class="toolbar-group" style="align-self:flex-end;">
          <div class="toolbar-row">
            <button id="wClear" class="btn-danger" data-i18n="btn-clear">🗑 Alles wissen</button>
          </div>
        </div>

      </div>
      <div class="tooltip-box" data-tooltip="w-sort"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="w-search">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-search"></span>
        <div class="toolbar-row">
        <input type="text" id="wSearch" data-i18n-ph="ph-search" placeholder="🔍 Zoeken…" style="flex:1;min-width:140px;">
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="w-search"></div>
    </div>

    <div class="table-wrap">
      <button class="help-btn" data-help="w-table" style="margin:14px 0 14px 20px;">?</button>
      <div class="tooltip-box" data-tooltip="w-table" style="margin:6px 16px 0;"></div>
      <table id="wTable">
        <thead>
          <tr>
            <th data-i18n="th-type">Type</th>
            <th data-i18n="th-meaning">Betekenis</th>
            <th data-i18n="th-verb">Werkwoord</th>
            <th>Ik</th>
            <th>Jij/Je</th>
            <th>Hij/Zij/Ze</th>
            <th>Wij/We</th>
            <th>Jullie</th>
            <th>Zij/Ze</th>
            <th data-i18n="th-prep">Prepositie</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="wBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       TAB 2 — ZINNEN
  ════════════════════════════════════════════════ -->
  <div id="zinnen" class="section">

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="z-add">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-add"></span>
        <div class="toolbar-row">
        <input type="text" id="zHulp" data-i18n-ph="ph-help-transl" placeholder="Hulp (vertaling…)" style="flex:1;min-width:160px;">
        <input type="text" id="zNl" data-i18n-ph="ph-dutch-sentence" placeholder="Nederlandse zin" style="flex:2;min-width:200px;">
        <button id="zAdd" data-i18n="btn-add">+ Toevoegen</button>
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="z-add"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="z-sort">?</button></div>
      <div class="toolbar" style="gap:16px;align-items:flex-start;">

        <div class="toolbar-group">
          <span class="toolbar-label" data-i18n="lbl-sort"></span>
          <div class="toolbar-row">
            <select id="zSort">
              <option value="original" data-i18n="opt-original">Origineel</option>
              <option value="abc">ABC</option>
              <option value="random" data-i18n="opt-random">Willekeurig</option>
            </select>
          </div>
        </div>

        <div class="toolbar-group" style="margin-left:auto;">
          <span class="toolbar-label" data-i18n="lbl-file"></span>
          <div class="toolbar-row">
            <button id="zDownload" data-i18n="btn-download">⬇ Downloaden</button>
            <label id="zFileLabel" class="btn-file" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;border:1.5px solid var(--border);background:white;color:var(--text);">
              <span data-i18n="btn-import">⬆ Importeren</span> <input type="file" id="zFile" accept=".xlsx,.csv">
            </label>
            <button id="zExample" class="btn-secondary" data-i18n="btn-example">📋 Voorbeeld</button>
          </div>
        </div>

        <div class="toolbar-group" style="align-self:flex-end;">
          <div class="toolbar-row">
            <button id="zClear" class="btn-danger" data-i18n="btn-clear">🗑 Alles wissen</button>
          </div>
        </div>

      </div>
      <div class="tooltip-box" data-tooltip="z-sort"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="z-search">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-search"></span>
        <div class="toolbar-row">
        <input type="text" id="zSearch" data-i18n-ph="ph-search" placeholder="🔍 Zoeken…" style="flex:1;min-width:140px;">
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="z-search"></div>
    </div>

    <div class="table-wrap">
      <button class="help-btn" data-help="z-table" style="margin:14px 0 14px 20px;">?</button>
      <div class="tooltip-box" data-tooltip="z-table" style="margin:6px 16px 0;"></div>
      <table id="zTable">
        <thead>
          <tr>
            <th data-i18n="th-dutch-sentence">Nederlandse zin 🔊</th>
            <th data-i18n="th-help">Hulp</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="zBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       TAB 3 — VRAAG & ANTWOORD
  ════════════════════════════════════════════════ -->
  <div id="qa" class="section">

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="q-add">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-add"></span>
        <div class="toolbar-row">
        <input type="text" id="qQ" data-i18n-ph="ph-question" placeholder="Vraag 🔊" style="flex:2;min-width:160px;">
        <input type="text" id="qHulp" data-i18n-ph="ph-help" placeholder="Hulp" style="flex:1;min-width:120px;">
        <input type="text" id="qA" data-i18n-ph="ph-answer" placeholder="Antwoord 🔊" style="flex:2;min-width:160px;">
        <button id="qAdd" data-i18n="btn-add">+ Toevoegen</button>
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="q-add"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="q-sort">?</button></div>
      <div class="toolbar" style="gap:16px;align-items:flex-start;">

        <div class="toolbar-group">
          <span class="toolbar-label" data-i18n="lbl-sort"></span>
          <div class="toolbar-row">
            <select id="qSort">
              <option value="original" data-i18n="opt-original">Origineel</option>
              <option value="abc">ABC</option>
              <option value="random" data-i18n="opt-random">Willekeurig</option>
            </select>
          </div>
        </div>

        <div class="toolbar-group" style="margin-left:auto;">
          <span class="toolbar-label" data-i18n="lbl-file"></span>
          <div class="toolbar-row">
            <button id="qDownload" data-i18n="btn-download">⬇ Downloaden</button>
            <label id="qFileLabel" class="btn-file" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;border:1.5px solid var(--border);background:white;color:var(--text);">
              <span data-i18n="btn-import">⬆ Importeren</span> <input type="file" id="qFile" accept=".xlsx,.csv">
            </label>
            <button id="qExample" class="btn-secondary" data-i18n="btn-example">📋 Voorbeeld</button>
          </div>
        </div>

        <div class="toolbar-group" style="align-self:flex-end;">
          <div class="toolbar-row">
            <button id="qClear" class="btn-danger" data-i18n="btn-clear">🗑 Alles wissen</button>
          </div>
        </div>

      </div>
      <div class="tooltip-box" data-tooltip="q-sort"></div>
    </div>

    <div class="card">
      <div class="card-header"><button class="help-btn" data-help="q-search">?</button></div>
      <div class="toolbar-group">
        <span class="toolbar-label" data-i18n="lbl-search"></span>
        <div class="toolbar-row">
        <input type="text" id="qSearch" data-i18n-ph="ph-search" placeholder="🔍 Zoeken…" style="flex:1;min-width:140px;">
        </div>
      </div>
      <div class="tooltip-box" data-tooltip="q-search"></div>
    </div>

    <div class="table-wrap">
      <button class="help-btn" data-help="q-table" style="margin:14px 0 14px 20px;">?</button>
      <div class="tooltip-box" data-tooltip="q-table" style="margin:6px 16px 0;"></div>
      <table id="qTable">
        <thead>
          <tr>
            <th data-i18n="th-question">Vraag 🔊</th>
            <th data-i18n="th-help">Hulp</th>
            <th data-i18n="th-answer">Antwoord 🔊</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="qBody"></tbody>
      </table>
    </div>
  </div>

</div><!-- .app -->

<button id="backToTop" aria-label="Back to top">
  ↑
</button>
<script src="script.js"></script>
</body>
</html>
